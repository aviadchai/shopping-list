<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D2420"/>
      <stop offset="100%" stop-color="#163832"/>
    </linearGradient>
    <linearGradient id="cart-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4DB6AC"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4DB6AC" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle grid lines in background -->
  <line x1="0" y1="170" x2="512" y2="170" stroke="rgba(77,182,172,0.06)" stroke-width="1"/>
  <line x1="0" y1="340" x2="512" y2="340" stroke="rgba(77,182,172,0.06)" stroke-width="1"/>
  <line x1="170" y1="0" x2="170" y2="512" stroke="rgba(77,182,172,0.06)" stroke-width="1"/>
  <line x1="340" y1="0" x2="340" y2="512" stroke="rgba(77,182,172,0.06)" stroke-width="1"/>

  <!-- Cart handle -->
  <path d="M 72,82 Q 72,58 96,58 L 148,58" stroke="url(#cart-fill)" stroke-width="24" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <line x1="148" y1="58" x2="166" y2="158" stroke="url(#cart-fill)" stroke-width="24" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Cart body (trapezoid shape) -->
  <path d="M 158,158 L 435,158 L 405,318 L 188,318 Z" fill="url(#cart-fill)" filter="url(#shadow)" rx="6"/>

  <!-- Cart body inner separator lines -->
  <line x1="255" y1="158" x2="242" y2="318" stroke="rgba(0,40,35,0.25)" stroke-width="2.5"/>
  <line x1="335" y1="158" x2="322" y2="318" stroke="rgba(0,40,35,0.25)" stroke-width="2.5"/>
  <line x1="158" y1="238" x2="430" y2="238" stroke="rgba(0,40,35,0.25)" stroke-width="2.5"/>

  <!-- Colorful product circles — top row -->
  <!-- Red (produce/vegetables) -->
  <circle cx="213" cy="198" r="30" fill="#FF5252" filter="url(#shadow)"/>
  <circle cx="213" cy="193" r="10" fill="rgba(255,255,255,0.3)"/>

  <!-- Orange (fruit) -->
  <circle cx="290" cy="198" r="30" fill="#FF9800" filter="url(#shadow)"/>
  <circle cx="290" cy="193" r="10" fill="rgba(255,255,255,0.3)"/>

  <!-- Yellow-green (dairy) -->
  <circle cx="367" cy="198" r="28" fill="#C6E52B" filter="url(#shadow)"/>
  <circle cx="367" cy="193" r="9" fill="rgba(255,255,255,0.3)"/>

  <!-- Bottom row -->
  <!-- Purple (sweets) -->
  <circle cx="220" cy="278" r="26" fill="#CE93D8" filter="url(#shadow)"/>
  <circle cx="220" cy="274" r="9" fill="rgba(255,255,255,0.3)"/>

  <!-- Cyan (beverages) -->
  <circle cx="293" cy="278" r="26" fill="#4FC3F7" filter="url(#shadow)"/>
  <circle cx="293" cy="274" r="9" fill="rgba(255,255,255,0.3)"/>

  <!-- Pink (bakery) -->
  <circle cx="364" cy="278" r="24" fill="#F48FB1" filter="url(#shadow)"/>
  <circle cx="364" cy="274" r="8" fill="rgba(255,255,255,0.3)"/>

  <!-- Cart bottom edge strip -->
  <rect x="188" y="309" width="217" height="18" rx="9" fill="#004D40"/>

  <!-- Wheels -->
  <circle cx="230" cy="368" r="32" fill="#1A4A44" stroke="#4DB6AC" stroke-width="9" filter="url(#shadow)"/>
  <circle cx="230" cy="368" r="9" fill="#4DB6AC"/>
  <circle cx="376" cy="368" r="32" fill="#1A4A44" stroke="#4DB6AC" stroke-width="9" filter="url(#shadow)"/>
  <circle cx="376" cy="368" r="9" fill="#4DB6AC"/>

  <!-- Deal badge — top right -->
  <circle cx="406" cy="104" r="62" fill="url(#badge)" filter="url(#shadow)"/>
  <!-- Star burst effect -->
  <path d="M406,46 L412,82 L446,72 L422,96 L452,110 L416,112 L422,148 L406,120 L390,148 L396,112 L360,110 L390,96 L366,72 L400,82 Z" fill="rgba(255,255,255,0.18)"/>
  <!-- % text -->
  <text x="406" y="98" text-anchor="middle" dominant-baseline="middle" font-family="system-ui,-apple-system,Roboto,sans-serif" font-size="48" font-weight="900" fill="#1A0A00" letter-spacing="-2">%</text>
  <text x="406" y="132" text-anchor="middle" dominant-baseline="middle" font-family="system-ui,-apple-system,Roboto,sans-serif" font-size="20" font-weight="800" fill="#2D1200">דיל</text>
</svg>
