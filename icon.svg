<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D2420"/>
      <stop offset="100%" stop-color="#163832"/>
    </linearGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4DB6AC"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Cart handle -->
  <polyline points="80,86 80,58 156,58" stroke="url(#cg)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="156" y1="58" x2="172" y2="158" stroke="url(#cg)" stroke-width="22" stroke-linecap="round"/>

  <!-- Cart body -->
  <path d="M 164,158 L 432,158 L 402,318 L 194,318 Z" fill="url(#cg)"/>

  <!-- Divider lines on cart -->
  <line x1="260" y1="159" x2="248" y2="317" stroke="rgba(0,45,38,0.3)" stroke-width="2.5"/>
  <line x1="338" y1="159" x2="326" y2="317" stroke="rgba(0,45,38,0.3)" stroke-width="2.5"/>
  <line x1="165" y1="239" x2="430" y2="239" stroke="rgba(0,45,38,0.3)" stroke-width="3"/>

  <!-- ── ROW 1 (y≈202) ── -->

  <!-- 1. ירקות (green) -->
  <circle cx="212" cy="202" r="33" fill="#388E3C"/>
  <g transform="translate(212,202)" fill="white" stroke="white" stroke-linecap="round">
    <!-- Carrot body -->
    <path d="M -7,-9 L 0,14 L 7,-9 Z" stroke="none" opacity="0.9"/>
    <!-- Leaves -->
    <line x1="0" y1="-9" x2="-6" y2="-19" stroke-width="2.2" fill="none"/>
    <line x1="0" y1="-9" x2="0" y2="-19" stroke-width="2.2" fill="none"/>
    <line x1="0" y1="-9" x2="6" y2="-19" stroke-width="2.2" fill="none"/>
  </g>

  <!-- 2. פירות (red) -->
  <circle cx="292" cy="202" r="33" fill="#C62828"/>
  <g transform="translate(292,202)" fill="white" stroke="white" stroke-linecap="round">
    <!-- Apple body -->
    <ellipse cx="0" cy="4" rx="9" ry="11" stroke="none" opacity="0.9"/>
    <!-- Apple top notch -->
    <path d="M -3,-7 Q 0,-6 3,-7" stroke="#C62828" stroke-width="2" fill="none"/>
    <!-- Stem -->
    <line x1="0" y1="-7" x2="2" y2="-15" stroke-width="2.2" fill="none"/>
  </g>

  <!-- 3. חלב (blue) -->
  <circle cx="370" cy="202" r="31" fill="#0277BD"/>
  <g transform="translate(370,202)">
    <!-- Milk bottle cap -->
    <rect x="-4" y="-16" width="8" height="5" rx="2" fill="white" opacity="0.9"/>
    <!-- Neck -->
    <path d="M -4,-11 L -6,-6 L 6,-6 L 4,-11 Z" fill="white" opacity="0.85"/>
    <!-- Body -->
    <path d="M -6,-6 Q -11,-4 -11,7 Q -11,14 0,14 Q 11,14 11,7 Q 11,-4 6,-6 Z" fill="white" opacity="0.9"/>
    <!-- Milk level line -->
    <line x1="-10" y1="5" x2="10" y2="5" stroke="#0277BD" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ── ROW 2 (y≈278) ── -->

  <!-- 4. בשר (deep orange) -->
  <circle cx="217" cy="278" r="29" fill="#BF360C"/>
  <g transform="translate(217,278)">
    <!-- Drumstick meat -->
    <ellipse cx="5" cy="7" rx="8" ry="10" fill="white" opacity="0.9"/>
    <!-- Bone -->
    <line x1="1" y1="0" x2="-8" y2="-12" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Bone knob -->
    <circle cx="-8" cy="-12" r="5" fill="white" opacity="0.9"/>
  </g>

  <!-- 5. שתייה (teal-cyan) -->
  <circle cx="293" cy="278" r="29" fill="#006064"/>
  <g transform="translate(293,278)">
    <!-- Water drop -->
    <path d="M 0,-14 Q 11,-3 11,5 Q 11,14 0,14 Q -11,14 -11,5 Q -11,-3 0,-14 Z" fill="white" opacity="0.9"/>
    <!-- Highlight -->
    <path d="M -6,2 Q -4,-2 -2,-2" stroke="#006064" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 6. מאפייה (amber) -->
  <circle cx="366" cy="278" r="27" fill="#E65100"/>
  <g transform="translate(366,278)">
    <!-- Bread loaf -->
    <path d="M -9,3 Q -9,-11 0,-12 Q 9,-11 9,3 L 9,8 Q 9,12 0,12 Q -9,12 -9,8 Z" fill="white" opacity="0.9"/>
    <!-- Score marks -->
    <line x1="-3" y1="-8" x2="-3" y2="8" stroke="#E65100" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="3" y1="-8" x2="3" y2="8" stroke="#E65100" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Cart bottom rail -->
  <rect x="194" y="309" width="208" height="16" rx="8" fill="#004D40"/>

  <!-- Wheels -->
  <circle cx="234" cy="368" r="31" fill="#1A4A44" stroke="#4DB6AC" stroke-width="9"/>
  <circle cx="234" cy="368" r="9" fill="#4DB6AC"/>
  <circle cx="375" cy="368" r="31" fill="#1A4A44" stroke="#4DB6AC" stroke-width="9"/>
  <circle cx="375" cy="368" r="9" fill="#4DB6AC"/>

  <!-- Deal badge -->
  <circle cx="408" cy="106" r="60" fill="url(#bg2)"/>
  <text x="408" y="100" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial,Helvetica,sans-serif" font-size="50" font-weight="900" fill="#1A0900">%</text>
  <text x="408" y="133" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="800" fill="#2D1200">דיל</text>
</svg>
