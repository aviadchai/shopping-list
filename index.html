<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>רשימת קניות</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22רשימת קניות%22,%22display%22:%22standalone%22,%22background_color%22:%22%230a0a0b%22}">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #0a0a0b;
  --surface: #141415;
  --surface2: #1e1e20;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --accent: #22c55e;
  --accent-dim: rgba(34,197,94,0.12);
  --text: #f2f2f3;
  --muted: #888;
  --danger: #ef4444;
  --info: #3b82f6;
  --warn: #f59e0b;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; height: 100dvh;
  font-family: 'Noto Sans Hebrew', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100dvh; }

/* ── Header ── */
header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo { font-size: 22px; }
.header-text { flex: 1; }
.header-text h1 { font-size: 15px; font-weight: 600; }
.header-text p { font-size: 11px; color: var(--muted); }
#sync-status {
  font-size: 11px; padding: 3px 9px;
  border-radius: 20px; border: 1px solid var(--border);
  color: var(--muted); transition: all 0.3s;
}
#sync-status.synced { color: var(--accent); border-color: var(--accent); }
#sync-status.syncing { color: var(--warn); border-color: var(--warn); }

/* ── Setup screen ── */
#setup-screen {
  display: none; flex: 1; overflow-y: auto;
  align-items: flex-start; justify-content: center;
  padding: 24px 20px;
}
#setup-screen.active { display: flex; }
.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px 20px;
  width: 100%; max-width: 420px;
}
.setup-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.setup-card p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
.setup-field { margin-bottom: 14px; }
.setup-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.setup-field input {
  width: 100%; padding: 10px 14px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; color: var(--text);
  font-family: inherit; font-size: 13px; outline: none;
  transition: border-color 0.2s;
}
.setup-field input:focus { border-color: var(--accent); }
.setup-btn {
  width: 100%; padding: 12px;
  background: var(--accent); color: #000;
  border: none; border-radius: 10px;
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; margin-top: 4px;
  transition: opacity 0.2s;
}
.setup-btn:hover { opacity: 0.88; }
.setup-err { font-size: 12px; color: var(--danger); margin-top: 8px; display: none; }

/* ── Main screen ── */
#main-screen {
  display: none; flex: 1;
  flex-direction: column; overflow: hidden;
}
#main-screen.active { display: flex; }

/* ── Body split ── */
.body { display: flex; flex: 1; overflow: hidden; }

/* ── List panel ── */
#list-panel {
  width: 44%; flex-shrink: 0;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.panel-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
  font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.badge {
  background: var(--accent-dim); color: var(--accent);
  font-size: 10px; font-weight: 600;
  padding: 1px 7px; border-radius: 10px;
}
.clear-done-btn {
  margin-right: auto;
  background: none; border: 1px solid var(--border);
  color: var(--muted); font-family: inherit; font-size: 11px;
  padding: 2px 8px; border-radius: 6px; cursor: pointer;
  transition: all 0.2s;
}
.clear-done-btn:hover { color: var(--danger); border-color: var(--danger); }

#items-scroll { flex: 1; overflow-y: auto; }

.empty-list {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; color: var(--muted); font-size: 13px; gap: 8px;
}
.empty-list .big { font-size: 32px; }

/* Category */
.cat-group { border-bottom: 1px solid var(--border); }
.cat-label {
  padding: 6px 14px;
  font-size: 10px; font-weight: 600;
  color: var(--muted); letter-spacing: 0.07em;
  background: rgba(255,255,255,0.02);
  display: flex; align-items: center; gap: 5px;
}

/* Item row */
.item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
  animation: itemIn 0.2s ease;
}
@keyframes itemIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
.item:last-child { border-bottom: none; }
.item:hover { background: var(--surface2); }

.chk {
  width: 19px; height: 19px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.chk.done { background: var(--accent); border-color: var(--accent); }
.chk.done::after {
  content: ''; width: 5px; height: 8px;
  border: 1.5px solid #000; border-top: none; border-left: none;
  transform: rotate(45deg) translate(-1px,-1px);
}
.item-name-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.item-name { font-size: 13px; transition: all 0.15s; }
.item-name.done { text-decoration: line-through; color: var(--muted); }
.item-note { font-size: 11px; color: var(--muted); }
.item-fact {
  display: none; font-size: 11px; color: #93c5fd;
  line-height: 1.5; padding-top: 3px;
  border-top: 1px solid var(--border); margin-top: 3px;
}
.item-fact.open { display: block; }
.info-btn {
  width: 17px; height: 17px; flex-shrink: 0;
  border: 1.5px solid var(--info); border-radius: 50%;
  background: none; cursor: pointer; padding: 0;
  color: var(--info); font-size: 10px;
  font-style: italic; font-weight: 700; font-family: Georgia, serif;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.15s; line-height: 1; opacity: 0.75;
}
.info-btn:hover, .info-btn.active { background: var(--info); color: #000; opacity: 1; }
.item-qty {
  font-size: 11px; padding: 1px 6px;
  background: rgba(59,130,246,0.15); color: #93c5fd;
  border-radius: 8px; flex-shrink: 0;
}
.del-btn {
  background: none; border: none; cursor: pointer;
  color: var(--border2); font-size: 17px; line-height: 1;
  padding: 2px 3px; opacity: 0; transition: all 0.15s;
}
.item:hover .del-btn { opacity: 1; }
.del-btn:hover { color: var(--danger); }

/* ── Chat panel ── */
#chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#messages {
  flex: 1; overflow-y: auto;
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 8px;
}

.msg {
  max-width: 88%; padding: 9px 13px;
  border-radius: 14px; font-size: 14px; line-height: 1.55;
  animation: msgIn 0.18s ease;
}
@keyframes msgIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

.msg.bot {
  align-self: flex-start;
  background: var(--surface2); border: 1px solid var(--border);
  border-bottom-right-radius: 4px; color: #ccc;
}
.msg.user {
  align-self: flex-end;
  background: rgba(34,197,94,0.13); border: 1px solid rgba(34,197,94,0.25);
  border-bottom-left-radius: 4px;
}
.msg .g { color: var(--accent); font-weight: 500; }
.msg .r { color: #fca5a5; }

.typing {
  align-self: flex-start; display: none;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 14px; border-bottom-right-radius: 4px;
  padding: 11px 14px; gap: 4px; align-items: center;
}
.typing.show { display: flex; }
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted); animation: bounce 1.2s infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* Hints */
#hints {
  display: flex; gap: 6px; flex-wrap: nowrap;
  overflow-x: auto; padding: 0 14px 8px;
  flex-shrink: 0; scrollbar-width: none;
}
#hints::-webkit-scrollbar { display: none; }
.hint {
  font-size: 12px; white-space: nowrap;
  padding: 4px 11px; border-radius: 12px;
  border: 1px solid var(--border); background: none;
  color: var(--muted); cursor: pointer; font-family: inherit;
  transition: all 0.15s; flex-shrink: 0;
}
.hint:hover { border-color: var(--accent); color: var(--accent); }

/* Input area */
#input-row {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
  flex-shrink: 0;
}
#input-wrap {
  flex: 1; display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 22px; padding: 8px 14px;
  transition: border-color 0.2s;
}
#input-wrap:focus-within { border-color: var(--accent); }
#txt {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: inherit; font-size: 14px;
  resize: none; max-height: 80px; line-height: 1.4;
}
#txt::placeholder { color: var(--muted); }

.btn-circle {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border2); background: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--muted); font-size: 17px;
  transition: all 0.2s;
}
.btn-circle:hover { background: var(--surface2); }
#mic-btn.rec {
  background: rgba(239,68,68,0.15); border-color: var(--danger);
  color: var(--danger); animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
#send-btn {
  background: var(--accent); border: none; color: #000;
  border-radius: 22px; padding: 0 18px;
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; height: 42px; flex-shrink: 0;
  transition: opacity 0.2s;
}
#send-btn:hover { opacity: 0.85; }

/* ── Toast (mobile bot replies) ── */
#toast {
  display: none;
  position: fixed; top: 62px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 14px; padding: 10px 18px;
  font-size: 13px; color: var(--text); line-height: 1.5;
  max-width: 88vw; text-align: center;
  z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#toast.show {
  display: block;
  animation: toastIn 0.2s ease;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@media (max-width: 640px) {
  /* Stack: list on top, input at bottom */
  .body { flex-direction: column-reverse; }

  #list-panel {
    width: 100%; flex: 1;
    border-left: none;
    border-bottom: 1px solid var(--border);
  }

  /* Hide chat history on mobile — replies show as toast */
  #messages, #typing, #hints { display: none; }
  #chat-panel { flex: 0 0 auto; }

  /* Touch-friendly targets */
  .chk { width: 26px; height: 26px; }
  .item { padding: 14px 16px; min-height: 52px; }
  .del-btn { opacity: 1; color: var(--muted); font-size: 22px; padding: 4px 8px; }
  .btn-circle { width: 44px; height: 44px; font-size: 20px; }
  .item-name { font-size: 15px; }
  .cat-label { font-size: 11px; padding: 7px 16px; }

  /* Safe area for notched phones */
  #input-row { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
}

/* ── Category collapse & drag ── */
.cat-label { cursor: pointer; user-select: none; position: relative; overflow: hidden; }
.cat-lbl-text { flex: 1; }
.cat-arrow {
  font-size: 12px; transition: transform 0.2s;
  display: inline-block; color: var(--muted);
}
.cat-arrow.col { transform: rotate(-90deg); }
.cat-items.hidden { display: none; }

.drag-handle {
  font-size: 15px; color: var(--border2);
  cursor: grab; touch-action: none;
  padding: 0 3px; user-select: none;
  line-height: 1;
}
.drag-handle:active { cursor: grabbing; }
.cat-group.dragging { opacity: 0.3; }
.drag-ghost {
  position: fixed; z-index: 500;
  opacity: 0.9; pointer-events: none;
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.cat-count { font-size: 10px; color: var(--muted); font-weight: 500; }
.cat-progress {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: var(--border);
}
.cat-progress-fill {
  height: 100%; background: var(--accent);
  transition: width 0.4s ease;
  border-radius: 2px;
}
.cat-done { text-decoration: line-through; opacity: 0.45; }

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <span class="logo">🛒</span>
    <div class="header-text">
      <h1>רשימת קניות</h1>
      <p id="header-sub">מופעל על Claude AI</p>
    </div>
    <span id="sync-status">⏳ מתחבר</span>
  </header>


  <!-- Main screen -->
  <div id="main-screen">
    <div class="body">

      <!-- Chat -->
      <div id="chat-panel">
        <div id="messages">
          <div class="msg bot">שלום! 👋 תגיד לי מה לקנות, מה להוריד, מה סימנת — ואני אעדכן את הרשימה.</div>
        </div>
        <div class="typing" id="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div id="hints">
          <button class="hint" onclick="fillHint('תוסיף חלב לחם וביצים')">חלב לחם ביצים</button>
          <button class="hint" onclick="fillHint('תוציא את הלחם')">תוציא לחם</button>
          <button class="hint" onclick="fillHint('סמן חלב כנקנה')">סמן נקנה</button>
          <button class="hint" onclick="fillHint('מה ברשימה?')">מה ברשימה?</button>
          <button class="hint" onclick="fillHint('נקה מה שקניתי')">נקה סומן</button>
        </div>
        <div id="input-row">
          <button class="btn-circle" id="mic-btn" onclick="toggleMic()">🎤</button>
          <div id="input-wrap">
            <textarea id="txt" rows="1" placeholder="תגיד מה לקנות..."
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          </div>
          <button id="send-btn" onclick="sendMsg()">שלח</button>
        </div>
      </div>

      <!-- List -->
      <div id="list-panel">
        <div class="panel-head">
          <span>רשימה</span>
          <span class="badge" id="item-count">0</span>
          <button class="clear-done-btn" onclick="clearDone()">נקה ✓</button>
        </div>
        <div id="items-scroll">
          <div class="empty-list"><span class="big">🛒</span><span>הרשימה ריקה</span></div>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

window._fbModules = { initializeApp, getFirestore, doc, onSnapshot, setDoc, getDoc };
window._fbReady = true;
window.dispatchEvent(new Event('fb-ready'));
</script>

<script>
// ── Config ────────────────────────────────────────────────
const cfg = {
  antKey:    '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',
  fbApiKey:  'AIzaSyD_UcFfuBdQMkRiEwZPhcxqdxmLCmgp6CU',
  fbProject: 'shoping-83493',
  fbAppId:   '1:508380767537:web:20410bed78a0ed36587c10'
};
let db = null, unsubscribe = null;
let items = [];
let chatHistory = [];
let recog = null, isRec = false;
let collapsedCats = new Set(JSON.parse(localStorage.getItem('collapsed_cats') || '[]'));
let catOrderOverride = JSON.parse(localStorage.getItem('cat_order') || 'null');

// ── Firebase init ─────────────────────────────────────────
function initFirebase() {
  if (!window._fbReady) { window.addEventListener('fb-ready', initFirebase, { once: true }); return; }
  const { initializeApp, getFirestore, doc, onSnapshot, setDoc, getDoc } = window._fbModules;

  const fbApp = initializeApp({
    apiKey: cfg.fbApiKey,
    authDomain: `${cfg.fbProject}.firebaseapp.com`,
    projectId: cfg.fbProject,
    appId: cfg.fbAppId
  }, 'shopping-app');

  db = getFirestore(fbApp);
  const docRef = doc(db, 'lists', 'main');

  setSyncStatus('syncing', '⟳ מתחבר');

  // Load once first
  getDoc(docRef).then(snap => {
    if (snap.exists()) items = snap.data().items || [];
    render();
    setSyncStatus('synced', '✓ מסונכרן');
  }).catch(() => setSyncStatus('', '✗ שגיאה'));

  // Live listener
  if (unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(docRef, snap => {
    if (snap.exists()) {
      items = snap.data().items || [];
      render();
    }
    setSyncStatus('synced', '✓ מסונכרן');
  }, () => setSyncStatus('', '✗ שגיאה'));

  window._fbDoc = docRef;
  window._fbSetDoc = setDoc;
}

async function persistItems() {
  if (!db || !window._fbDoc) return;
  setSyncStatus('syncing', '⟳ שומר');
  try {
    await window._fbSetDoc(window._fbDoc, { items }, { merge: true });
    setSyncStatus('synced', '✓ מסונכרן');
  } catch(e) { setSyncStatus('', '✗ שגיאה'); }
}

function setSyncStatus(cls, text) {
  const el = document.getElementById('sync-status');
  el.className = cls;
  el.textContent = text;
}

// ── Init ──────────────────────────────────────────────────
function initApp() {
  document.getElementById('main-screen').classList.add('active');
  initFirebase();
}

// Boot
initApp();

// ── Render ────────────────────────────────────────────────
const CAT_ICONS = {
  'ירקות ופירות': '🥦',
  'מאפייה': '🍞',
  'חלב וביצים': '🥛',
  'בשר ודגים': '🥩',
  'מוצרי ניקיון': '🧹',
  'שימורים ויבשים': '🥫',
  'משקאות': '🍶',
  'קפואים': '❄️',
  'ממתקים וחטיפים': '🍫',
  'אחר': '🛒'
};

function render() {
  const scroll = document.getElementById('items-scroll');
  const count = document.getElementById('item-count');
  const undone = items.filter(i => !i.done);
  count.textContent = undone.length;

  if (!items.length) {
    scroll.innerHTML = '<div class="empty-list"><span class="big">🛒</span><span>הרשימה ריקה</span></div>';
    return;
  }

  const byCat = {};
  items.forEach(it => {
    const c = it.category || 'אחר';
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(it);
  });

  let catOrder = Object.keys(byCat);
  if (catOrderOverride) {
    catOrder = [
      ...catOrderOverride.filter(c => byCat[c]),
      ...catOrder.filter(c => !catOrderOverride.includes(c))
    ];
  }

  scroll.innerHTML = catOrder.map(cat => {
    const icon = CAT_ICONS[cat] || '🛒';
    const catItems = byCat[cat];
    const collapsed = collapsedCats.has(cat);
    const doneCount = catItems.filter(i => i.done).length;
    const total = catItems.length;
    const pct = total ? Math.round(doneCount / total * 100) : 0;
    const allDone = doneCount === total && total > 0;
    return `<div class="cat-group" data-cat="${esc(cat)}">
      <div class="cat-label" onclick="catClick(event,'${cat}')">
        <span class="drag-handle">⠿</span>
        <span class="cat-lbl-text${allDone?' cat-done':''}">${icon} ${cat}</span>
        <span class="cat-count">${doneCount}/${total}</span>
        <span class="cat-arrow${collapsed?' col':''}">▾</span>
        <div class="cat-progress"><div class="cat-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="cat-items${collapsed?' hidden':''}">
        ${catItems.map(it => `
          <div class="item">
            <div class="chk ${it.done?'done':''}" onclick="toggle('${it.id}')"></div>
            <div class="item-name-wrap">
              <span class="item-name ${it.done?'done':''}">${esc(it.name)}</span>
              ${it.note ? `<span class="item-note">${esc(it.note)}</span>` : ''}
              ${it.fun_fact ? `<span class="item-fact" id="fact-${it.id}">💡 ${esc(it.fun_fact)}</span>` : ''}
            </div>
            ${it.qty ? `<span class="item-qty">${esc(it.qty)}</span>` : ''}
            ${it.fun_fact ? `<button class="info-btn" onclick="toggleFact('${it.id}')" title="הידעת?">i</button>` : ''}
            <button class="del-btn" onclick="delItem('${it.id}')">×</button>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  initAllDrags();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toggleFact(id) {
  const fact = document.getElementById('fact-' + id);
  if (!fact) return;
  fact.classList.toggle('open');
  const btn = fact.closest('.item')?.querySelector('.info-btn');
  btn?.classList.toggle('active', fact.classList.contains('open'));
}

// ── Category collapse ─────────────────────────────────────
function catClick(e, cat) {
  if (e.target.closest('.drag-handle')) return;
  if (collapsedCats.has(cat)) collapsedCats.delete(cat);
  else collapsedCats.add(cat);
  localStorage.setItem('collapsed_cats', JSON.stringify([...collapsedCats]));
  render();
}

// ── Category drag to reorder ──────────────────────────────
function initAllDrags() {
  document.querySelectorAll('#items-scroll .drag-handle').forEach(h => {
    h.addEventListener('pointerdown', startCatDrag);
  });
}

function startCatDrag(e) {
  e.preventDefault();
  const handle = e.currentTarget;
  const group = handle.closest('.cat-group');
  const container = group.parentElement;

  const rect = group.getBoundingClientRect();
  const ghost = group.cloneNode(true);
  ghost.classList.add('drag-ghost');
  ghost.style.top = rect.top + 'px';
  ghost.style.left = rect.left + 'px';
  ghost.style.width = rect.width + 'px';
  document.body.appendChild(ghost);

  group.classList.add('dragging');
  const offsetY = e.clientY - rect.top;
  try { handle.setPointerCapture(e.pointerId); } catch(_) {}

  const onMove = e => {
    const y = e.clientY;
    ghost.style.top = (y - offsetY) + 'px';
    const all = [...container.querySelectorAll('.cat-group')];
    let placed = false;
    for (const g of all) {
      if (g === group) continue;
      const r = g.getBoundingClientRect();
      if (y < r.top + r.height / 2) {
        container.insertBefore(group, g);
        placed = true;
        break;
      }
    }
    if (!placed) container.appendChild(group);
  };

  const onUp = () => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    ghost.remove();
    group.classList.remove('dragging');
    catOrderOverride = [...container.querySelectorAll('.cat-group')].map(g => g.dataset.cat);
    localStorage.setItem('cat_order', JSON.stringify(catOrderOverride));
  };

  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

// ── Confetti ──────────────────────────────────────────────
function launchConfetti(labelEl) {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:999;';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const rect = labelEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const colors = ['#22c55e','#3b82f6','#f59e0b','#ef4444','#a855f7','#06b6d4','#fff'];
  const pts = Array.from({length: 55}, () => ({
    x: cx, y: cy,
    vx: (Math.random() - 0.5) * 10,
    vy: -(Math.random() * 9 + 3),
    color: colors[Math.floor(Math.random() * colors.length)],
    w: Math.random() * 7 + 3,
    h: Math.random() * 4 + 2,
    alpha: 1,
    rot: Math.random() * 360,
    rotV: (Math.random() - 0.5) * 12
  }));
  (function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.35;
      p.vx *= 0.99; p.alpha -= 0.016; p.rot += p.rotV;
      if (p.alpha <= 0) return;
      alive = true;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (alive) requestAnimationFrame(draw);
    else canvas.remove();
  })();
}

function checkCatComplete(prevItems) {
  const prev = {};
  prevItems.forEach(i => { const c = i.category||'אחר'; (prev[c]=prev[c]||[]).push(i); });
  const curr = {};
  items.forEach(i => { const c = i.category||'אחר'; (curr[c]=curr[c]||[]).push(i); });
  for (const cat in curr) {
    if (curr[cat].every(i=>i.done) && !prev[cat]?.every(i=>i.done)) {
      setTimeout(() => {
        const el = document.querySelector(`.cat-group[data-cat="${cat}"] .cat-label`);
        if (el) launchConfetti(el);
      }, 120);
    }
  }
}

function toggle(id) {
  const it = items.find(i => i.id === id);
  if (it) {
    const prev = items.map(i => ({...i}));
    it.done = !it.done;
    if (it.done) checkCatComplete(prev);
    persistItems(); render();
  }
}
function delItem(id) {
  items = items.filter(i => i.id !== id);
  persistItems(); render();
}
function clearDone() {
  const n = items.filter(i=>i.done).length;
  items = items.filter(i=>!i.done);
  persistItems(); render();
  if (n) addBot(`הסרתי ${n} פריטים שסומנו ✓`);
}

// ── Claude API ────────────────────────────────────────────
const SYSTEM = `אתה עוזר חכם לניהול רשימת קניות. המשתמש מדבר איתך בעברית טבעית — כל ניסוח.
עליך להחזיר JSON בלבד, ללא markdown, ללא הסברים. תמיד JSON אחד בלבד.

פעולות אפשריות:
- add: הוסף פריטים
- clarify: שאל שאלה מבהירה לפני הוספה — כשהמוצר דו-משמעי (לדוג': חומוס למריחה או גרגירים? קולה רגיל או זירו? יוגורט איזה אחוז?). אל תוסיף כלום, רק שאל ב-reply.
- remove: הסר פריט (לפי target - שם חלקי)
- update: שנה שם / קטגוריה / כמות של פריט קיים
- toggle_done: סמן/בטל סימון פריט
- clear_done: מחק את כל הסומנים
- clear_all: מחק הכל
- show: הצג רשימה
- chat: תשובה ללא שינוי — כולל המלצות על מוצרים, השוואות, עצות קנייה

מחלקות: ירקות ופירות, מאפייה, חלב וביצים, בשר ודגים, מוצרי ניקיון, שימורים ויבשים, משקאות, קפואים, ממתקים וחטיפים, אחר

פורמט:
{"action":"...","items":[{"name":"...","qty":"...","category":"...","note":"...","fun_fact":"..."}],"target":"...","new_name":"...","category":"...","reply":"..."}

כללים חשובים:
- "תוציא X" / "הסר X" / "מחק X" = remove
- "תחזיר X" = add
- "סמן X" / "קניתי X" = toggle_done
- "שנה שם X ל-Y" / "תחליף X ב-Y" = update עם target=X, new_name=Y
- "העבר X למחלקה Y" / "תעביר X ל-Y" = update עם target=X, category=Y
- update יכול לשנות גם שם וגם קטגוריה בבת אחת
- אף פעם לא שתי פעולות נפרדות במקום update אחד
- qty יכול להיות null אם לא צוין
- שם הפריט חייב לכלול צבע / גודל / סוג / מותג אם צוינו (לדוג': "ניקול אדום", "חלב 3%", "לחם שיפון", "קולה זירו")
- note: הערה קצרה אם יש שם אדם / הוראה ספציפית / הערה (לדוג': "לאוהד", "לא המלוח", "רק אורגני"). null אם אין.
- fun_fact (בתוך כל פריט): עובדה מדעית / היסטורית / מעניינת על הפריט הספציפי הזה בדיוק — לא על מוצר בעל שם דומה. אם לא בטוח, החזר null. משפט אחד קצר בעברית. null בשאר הפעולות.
- reply תמיד מלא, קצר, נעים, בעברית
- כשמוסיפים מוצר שיש לו וריאנטים — כלול ב-reply המלצה קצרה (מותג, גרסה בריאה יותר, טיפ). לדוג': "הוספתי חומוס! טיפ: חפש עם פחות נתרן ויותר טחינה 🌿"
- אם המשתמש שואל "איזה X מומלץ" — תן תשובה עם action:chat והמלצה ספציפית ואמינה`;

async function callClaude(userMsg) {
  if (!cfg?.antKey) return { action: 'chat', reply: 'חסר API Key — נא לפתוח הגדרות' };

  const listCtx = items.length
    ? '\n\nרשימה נוכחית:\n' + items.map(i=>`- ${i.name}${i.qty?` ×${i.qty}`:''}${i.done?' [נקנה]':''} [${i.category||'אחר'}]`).join('\n')
    : '\n\nהרשימה ריקה.';

  chatHistory.push({ role: 'user', content: userMsg });

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': cfg.antKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM + listCtx,
      messages: chatHistory.slice(-8)
    })
  });

  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);

  const text = data.content?.[0]?.text || '{}';
  chatHistory.push({ role: 'assistant', content: text });

  try {
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  } catch(e) {
    return { action: 'chat', reply: text };
  }
}

function applyCmd(cmd) {
  const a = cmd.action;
  const result = {};
  if (a === 'add' && cmd.items?.length) {
    const skipped = [];
    cmd.items.forEach(({ name, qty, category, note, fun_fact }) => {
      if (!name) return;
      const ex = items.find(i => i.name.toLowerCase() === name.toLowerCase());
      if (ex) {
        skipped.push(name);
        if (qty) ex.qty = qty; if (note) ex.note = note; ex.done = false;
      } else {
        items.push({ id: crypto.randomUUID(), name, qty: qty||null, category: category||'אחר', note: note||null, fun_fact: fun_fact||null, done: false });
      }
    });
    persistItems(); render();
    if (skipped.length) result.skipped = skipped;
  } else if (a === 'remove' && cmd.target) {
    const q = cmd.target.toLowerCase();
    items = items.filter(i => !i.name.toLowerCase().includes(q));
    persistItems(); render();
  } else if (a === 'update' && cmd.target) {
    const q = cmd.target.toLowerCase();
    const it = items.find(i => i.name.toLowerCase().includes(q));
    if (it) {
      if (cmd.new_name) it.name = cmd.new_name;
      if (cmd.category) it.category = cmd.category;
      if (cmd.qty !== undefined && cmd.qty !== null) it.qty = cmd.qty;
      persistItems(); render();
    }
  } else if (a === 'toggle_done' && cmd.target) {
    const q = cmd.target.toLowerCase();
    const it = items.find(i => i.name.toLowerCase().includes(q));
    if (it) { it.done = !it.done; persistItems(); render(); }
  } else if (a === 'clear_done') {
    items = items.filter(i=>!i.done);
    persistItems(); render();
  } else if (a === 'clear_all') {
    items = [];
    persistItems(); render();
  }
  return result;
}

// ── Chat UI ───────────────────────────────────────────────
let _toastTimer = null;
function addBot(html) {
  if (window.innerWidth <= 640) {
    const toast = document.getElementById('toast');
    toast.innerHTML = html;
    toast.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
    return;
  }
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.innerHTML = html;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}
function addUser(text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg user'; d.textContent = text;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

async function sendMsg() {
  const inp = document.getElementById('txt');
  const text = inp.value.trim();
  if (!text) return;
  addUser(text);
  inp.value = ''; autoResize(inp);

  const typing = document.getElementById('typing');
  typing.classList.add('show');
  try {
    const cmd = await callClaude(text);
    const res = applyCmd(cmd);
    if (cmd.reply) addBot(cmd.reply);
    if (res.skipped?.length) {
      const names = res.skipped.map(n => `<strong>${esc(n)}</strong>`).join(', ');
      addBot(`המצרכים הבאים נכללו ברשימה המקורית: ${names}`);
    }
  } catch(e) {
    addBot(`<span class="r">שגיאה: ${e.message}</span>`);
  } finally {
    typing.classList.remove('show');
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}
function fillHint(t) {
  const inp = document.getElementById('txt');
  inp.value = t; inp.focus();
}

// ── Voice ─────────────────────────────────────────────────
function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    addBot('הדפדפן לא תומך בזיהוי קולי — נסה Chrome');
    return;
  }
  if (isRec) { recog.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recog = new SR(); recog.lang = 'he-IL';
  recog.onstart = () => { isRec = true; document.getElementById('mic-btn').classList.add('rec'); };
  recog.onresult = e => { document.getElementById('txt').value = e.results[0][0].transcript; sendMsg(); };
  recog.onerror = () => addBot('לא הצלחתי לשמוע 🎤');
  recog.onend = () => { isRec = false; document.getElementById('mic-btn').classList.remove('rec'); };
  recog.start();
}
